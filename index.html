<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Showdown — Scoreboard</title>
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB5PSIuOWVtIiBmb250LXNpemU9IjkwIj7wn4+GPC90ZXh0Pjwvc3ZnPg==">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#EDEEF2;
    --ink-dim:#9AA0AC;
    --ink-faint:#5A606C;
    --bg:#0E1116;
    --bg-raised:#171B23;
    --bg-card:#1C212B;
    --line:#2A303C;
    --violet:#8B5CF6;
    --violet-dim:#8B5CF62A;
    --lebron:#F2A93B;
    --lebron-dim:#F2A93B2A;
    --ronaldo:#E5484D;
    --ronaldo-dim:#E5484D2A;
    --gold:#FDD34D;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, #1a1f2a 0%, transparent 60%),
      radial-gradient(1000px 500px at 110% 10%, #1a1620 0%, transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding-bottom:80px;
  }
  .wrap{ max-width:1080px; margin:0 auto; padding:0 24px; }

  /* ---------- HEADER ---------- */
  header{ padding:36px 0 20px; }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--ink-faint);
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
  }
  .eyebrow .dot{
    width:6px; height:6px; border-radius:50%;
    background:#3ED598;
    box-shadow:0 0 0 3px #3ED59822;
    animation:pulse 2s infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.4} }
  h1.title{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:42px;
    letter-spacing:-0.02em;
    line-height:1;
  }
  h1.title span{ color:var(--gold); }

  nav{
    display:flex;
    gap:6px;
    margin-top:28px;
    border-bottom:1px solid var(--line);
    overflow-x:auto;
  }
  nav button{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:14.5px;
    background:none;
    border:none;
    color:var(--ink-dim);
    padding:12px 18px;
    cursor:pointer;
    border-bottom:2px solid transparent;
    white-space:nowrap;
    transition:color .15s ease;
  }
  nav button:hover{ color:var(--ink); }
  nav button.active{ color:var(--ink); border-bottom-color:var(--gold); }

  .view{ display:none; padding-top:32px; animation:fadein .35s ease; }
  .view.active{ display:block; }
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- LEADERBOARD ---------- */
  .board{
    background:var(--bg-raised);
    border:1px solid var(--line);
    border-radius:16px;
    padding:28px 28px 24px;
    margin-bottom:32px;
  }
  .board h2{
    font-family:'Space Grotesk', sans-serif;
    font-size:13px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--ink-faint);
    margin-bottom:22px;
  }
  .race-row{ margin-bottom:20px; }
  .race-row:last-child{ margin-bottom:0; }
  .race-label{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:7px;
  }
  .race-name{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:16px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .race-name .crown{ font-size:14px; }
  .race-score{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:18px;
  }
  .race-track{
    height:14px;
    background:#00000040;
    border-radius:8px;
    overflow:hidden;
    position:relative;
  }
  .race-fill{
    height:100%;
    border-radius:8px;
    width:0%;
    transition:width 1.1s cubic-bezier(.16,1,.3,1);
    position:relative;
  }
  .race-fill::after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(90deg, transparent, #ffffff30, transparent);
  }

  /* ---------- RECENT FEED ---------- */
  .section-head{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px;
  }
  .section-head h2{
    font-family:'Space Grotesk', sans-serif;
    font-size:13px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--ink-faint);
  }

  .card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:14px;
  }
  .card{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-left:3px solid var(--team-color, var(--gold));
    border-radius:12px;
    padding:16px 16px 14px;
    position:relative;
    transition:transform .15s ease, border-color .15s ease;
  }
  .card:hover{ transform:translateY(-2px); }
  .card-top{
    display:flex; align-items:flex-start; justify-content:space-between;
    margin-bottom:10px;
  }
  .card-icon{ font-size:20px; line-height:1; }
  .card-points{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:17px;
    color:var(--team-color, var(--gold));
  }
  .card-why{
    font-size:14.5px;
    line-height:1.4;
    color:var(--ink);
    margin-bottom:12px;
    min-height:38px;
  }
  .card-foot{
    display:flex; align-items:center; justify-content:space-between;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--ink-faint);
  }
  .card-team-chip{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:11px;
    padding:3px 8px;
    border-radius:20px;
    background:var(--team-color-dim, #ffffff10);
    color:var(--team-color, var(--ink-dim));
  }
  .card-del{
    position:absolute; top:10px; right:10px;
    background:none; border:none; color:var(--ink-faint);
    font-size:14px; cursor:pointer; opacity:0; transition:opacity .15s;
    width:22px; height:22px;
  }
  .card:hover .card-del{ opacity:1; }
  .card-del:hover{ color:var(--ronaldo); }

  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-faint);
    font-size:14px;
    border:1px dashed var(--line);
    border-radius:12px;
  }

  /* ---------- TEAM PAGE ---------- */
  .team-header{
    display:flex; align-items:center; gap:20px;
    margin-bottom:28px;
    padding-bottom:24px;
    border-bottom:1px solid var(--line);
  }
  .team-badge{
    width:64px; height:64px;
    border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:24px;
    color:#0E1116;
    flex-shrink:0;
  }
  .team-header h2{
    font-family:'Space Grotesk', sans-serif;
    font-size:30px;
    font-weight:700;
    letter-spacing:-.01em;
  }
  .team-total{
    font-family:'JetBrains Mono', monospace;
    color:var(--ink-dim);
    font-size:14px;
    margin-top:4px;
  }
  .team-total b{ color:var(--ink); }
  .roster{
    display:flex; flex-wrap:wrap; gap:8px;
    margin-bottom:26px;
  }
  .roster-chip{
    font-size:13px;
    font-weight:500;
    padding:6px 13px;
    border-radius:20px;
    background:var(--bg-card);
    border:1px solid var(--line);
    color:var(--ink-dim);
  }

  /* ---------- ADD BUTTON + MODAL ---------- */
  .fab{
    position:fixed; bottom:28px; right:28px;
    background:var(--gold);
    color:#1a1400;
    border:none;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:14.5px;
    padding:15px 22px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 8px 24px #00000060, 0 0 0 1px #ffffff20 inset;
    display:flex; align-items:center; gap:8px;
    transition:transform .15s ease;
    z-index:50;
  }
  .fab:hover{ transform:translateY(-2px) scale(1.02); }

  .modal-backdrop{
    display:none;
    position:fixed; inset:0;
    background:#00000090;
    backdrop-filter:blur(3px);
    z-index:100;
    align-items:center; justify-content:center;
    padding:20px;
  }
  .modal-backdrop.active{ display:flex; }
  .modal{
    background:var(--bg-raised);
    border:1px solid var(--line);
    border-radius:16px;
    padding:26px;
    width:100%; max-width:420px;
    animation:slideup .25s ease;
  }
  @keyframes slideup{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  .modal h3{
    font-family:'Space Grotesk', sans-serif;
    font-size:19px; font-weight:700;
    margin-bottom:18px;
  }
  .field{ margin-bottom:14px; }
  .field label{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--ink-faint);
    text-transform:uppercase;
    letter-spacing:.05em;
    margin-bottom:6px;
  }
  .field input, .field select, .field textarea{
    width:100%;
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    color:var(--ink);
    font-family:'Inter', sans-serif;
    font-size:14px;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none; border-color:var(--gold);
  }
  .team-select{ display:flex; gap:8px; }
  .team-opt{
    flex:1;
    text-align:center;
    padding:10px 6px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--bg-card);
    color:var(--ink-dim);
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition:all .12s ease;
  }
  .team-opt.selected{
    color:#0E1116;
    border-color:transparent;
  }
  .modal-actions{
    display:flex; gap:10px; margin-top:20px;
  }
  .btn{
    flex:1;
    padding:11px;
    border-radius:8px;
    border:none;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
  }
  .btn-primary{ background:var(--gold); color:#1a1400; }
  .btn-ghost{ background:none; border:1px solid var(--line); color:var(--ink-dim); }
  .btn-primary:hover{ filter:brightness(1.08); }

  ::-webkit-scrollbar{ height:6px; width:6px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:3px; }

  @media (max-width:520px){
    h1.title{ font-size:32px; }
    .team-header{ gap:14px; }
    .team-badge{ width:52px; height:52px; font-size:19px; }
    .team-header h2{ font-size:24px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="eyebrow"><span class="dot"></span>LIVE SCOREBOARD</div>
    <h1 class="title">Camp Showdown<span>.</span></h1>
    <nav id="nav"></nav>
  </header>

  <!-- LEADERBOARD VIEW -->
  <section class="view" id="view-leaderboard">
    <div class="board">
      <h2>Standings</h2>
      <div id="race"></div>
    </div>

    <div class="section-head">
      <h2>Recent Achievements</h2>
    </div>
    <div class="card-grid" id="feed-all"></div>
  </section>

  <!-- TEAM VIEWS get injected here -->
  <div id="team-views"></div>
</div>

<button class="fab" id="openAdd">+ Log points</button>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h3>Log an achievement</h3>
    <div class="field">
      <label>Team</label>
      <div class="team-select" id="teamSelect"></div>
    </div>
    <div class="field">
      <label>Points</label>
      <input type="number" id="fPoints" placeholder="20">
    </div>
    <div class="field">
      <label>What happened</label>
      <input type="text" id="fWhy" placeholder="found hidden easter egg">
    </div>
    <div class="field">
      <label>Date</label>
      <input type="text" id="fDate" placeholder="07/02">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelAdd">Cancel</button>
      <button class="btn btn-primary" id="saveAdd">Save</button>
    </div>
  </div>
</div>

<script>
/* ============ CONFIG — fill these in ============
   1. Go to https://jsonbin.io and create a free account.
   2. Create a new bin. Paste this as its starting content:
        {"achievements":[]}
   3. Copy the Bin ID (in the URL after creating it) into BIN_ID below.
   4. Go to Account > API Keys, copy your "Master Key" into BIN_KEY below.
   5. Set EDIT_PASSWORD to whatever password you want to require before
      anyone can log points or delete a card.
   Note: this key lives in the page source, so it's a soft deterrent
   (fine for a classroom), not bank-vault security.
================================================== */
const BIN_ID = '6a46b277f5f4af5e2955b46f';
const BIN_KEY = '$2a$10$iv2M/2uU5AUOs6QizgYro.Euj.tRXjMix.FyPVftVI5rwwakh4IRu';
const EDIT_PASSWORD = 'CLEARKey88914000';
const REFRESH_MS = 15000; // how often viewers auto-refresh to see new points

let isUnlocked = false;

async function requireUnlock(){
  if(isUnlocked) return true;
  const attempt = prompt('Enter the password to edit the scoreboard:');
  if(attempt === EDIT_PASSWORD){
    isUnlocked = true;
    return true;
  }
  if(attempt !== null) alert('Wrong password.');
  return false;
}

const TEAMS = [
  { id:'violet',  name:'Violet Aroras', color:'#8B5CF6', dim:'#8B5CF62A', members:['Lahari','Ammu','Aadvika','Aadhya'] },
  { id:'lebron',  name:'Lebron',        color:'#F2A93B', dim:'#F2A93B2A', members:['Aarav','Ishaan','Sid D'] },
  { id:'ronaldo', name:'Ronaldo',       color:'#E5484D', dim:'#E5484D2A', members:['Sid G','Vinny','Advay'] },
];

const DEFAULT_ACHIEVEMENTS = [
  { id:1, team:'violet',  points:20, why:'Answered Review Question',            date:'06/30' },
  { id:2, team:'violet',  points:60, why:'Found Hidden Easter Egg',             date:'06/30' },
  { id:3, team:'violet',  points:20, why:'Answered Hidden Easter Egg Question', date:'06/30' },
  { id:4, team:'lebron',  points:20, why:'Participated In Group Activity',      date:'06/30' },
  { id:5, team:'ronaldo', points:20, why:'Participated In Group Activity',      date:'06/30' },
];

let achievements = [];
let currentView = 'leaderboard';
let selectedTeam = TEAMS[0].id;

function teamOf(id){ return TEAMS.find(t => t.id === id); }

function iconFor(why){
  const w = why.toLowerCase();
  if(w.includes('egg')) return '🥚';
  if(w.includes('question') || w.includes('review')) return '❓';
  if(w.includes('group') || w.includes('activit')) return '🤝';
  if(w.includes('race') || w.includes('relay')) return '🏃';
  if(w.includes('win') || w.includes('won') || w.includes('challenge')) return '🏆';
  if(w.includes('craft') || w.includes('art')) return '🎨';
  if(w.includes('song') || w.includes('sing')) return '🎤';
  return '⭐';
}

function totalFor(teamId){
  return achievements.filter(a => a.team === teamId).reduce((s,a) => s + Number(a.points), 0);
}

async function loadData(){
  try{
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { 'X-Master-Key': BIN_KEY }
    });
    if(!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    const list = data.record && data.record.achievements;
    achievements = (list && list.length) ? list : DEFAULT_ACHIEVEMENTS;
    if(!list || !list.length) await persist(); // seed the bin on first run
  }catch(e){
    console.error('load failed, showing local defaults', e);
    achievements = DEFAULT_ACHIEVEMENTS;
  }
  renderAll();
}

async function persist(){
  try{
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': BIN_KEY },
      body: JSON.stringify({ achievements })
    });
    if(!res.ok) throw new Error('save failed');
  }catch(e){
    console.error('save failed', e);
    alert("Couldn't save to the shared scoreboard — check your internet connection and try again.");
  }
}

function buildNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  const items = [{id:'leaderboard', label:'Leaderboard'}, ...TEAMS.map(t => ({id:t.id, label:t.name}))];
  items.forEach(it => {
    const b = document.createElement('button');
    b.textContent = it.label;
    b.className = currentView === it.id ? 'active' : '';
    b.onclick = () => { currentView = it.id; render(); };
    nav.appendChild(b);
  });
}

function render(){
  buildNav();
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const target = document.getElementById('view-' + currentView) || document.getElementById('team-view-' + currentView);
  if(target) target.classList.add('active');
  renderLeaderboard();
}

function cardHTML(a){
  const t = teamOf(a.team);
  return `
    <div class="card" style="--team-color:${t.color}; --team-color-dim:${t.dim}">
      <button class="card-del" onclick="deleteAchievement(${a.id})" title="Remove">✕</button>
      <div class="card-top">
        <span class="card-icon">${iconFor(a.why)}</span>
        <span class="card-points">+${a.points}</span>
      </div>
      <div class="card-why">${a.why}</div>
      <div class="card-foot">
        <span class="card-team-chip">${t.name}</span>
        <span>${a.date}</span>
      </div>
    </div>`;
}

function renderLeaderboard(){
  const totals = TEAMS.map(t => ({...t, total: totalFor(t.id)})).sort((a,b) => b.total - a.total);
  const max = Math.max(1, ...totals.map(t => t.total));

  const race = document.getElementById('race');
  race.innerHTML = totals.map((t, i) => `
    <div class="race-row">
      <div class="race-label">
        <span class="race-name">${i===0 && t.total>0 ? '<span class="crown">👑</span>' : ''}${t.name}</span>
        <span class="race-score" style="color:${t.color}">${t.total} pts</span>
      </div>
      <div class="race-track">
        <div class="race-fill" style="background:${t.color}" data-width="${(t.total/max*100)}"></div>
      </div>
    </div>
  `).join('');

  requestAnimationFrame(() => {
    document.querySelectorAll('.race-fill').forEach(el => {
      el.style.width = el.dataset.width + '%';
    });
  });

  const feed = document.getElementById('feed-all');
  const sorted = [...achievements].sort((a,b) => b.id - a.id);
  feed.innerHTML = sorted.length
    ? sorted.map(cardHTML).join('')
    : `<div class="empty">No points logged yet — tap "+ Log points" to add the first one.</div>`;
}

function buildTeamViews(){
  const container = document.getElementById('team-views');
  container.innerHTML = TEAMS.map(t => `
    <section class="view" id="team-view-${t.id}">
      <div class="team-header">
        <div class="team-badge" style="background:${t.color}">${t.name.slice(0,2).toUpperCase()}</div>
        <div>
          <h2>${t.name}</h2>
          <div class="team-total">Total score: <b id="total-${t.id}">0</b> pts</div>
        </div>
      </div>
      <div class="roster">${t.members.map(m => `<span class="roster-chip">${m}</span>`).join('')}</div>
      <div class="card-grid" id="feed-${t.id}"></div>
    </section>
  `).join('');
}

function renderTeamPages(){
  TEAMS.forEach(t => {
    const total = totalFor(t.id);
    document.getElementById('total-' + t.id).textContent = total;
    const teamAch = achievements.filter(a => a.team === t.id).sort((a,b) => b.id - a.id);
    const el = document.getElementById('feed-' + t.id);
    el.innerHTML = teamAch.length
      ? teamAch.map(cardHTML).join('')
      : `<div class="empty">No points logged for ${t.name} yet.</div>`;
  });
}

function renderAll(){
  buildTeamViews();
  render();
  renderTeamPages();
}

async function deleteAchievement(id){
  if(!(await requireUnlock())) return;
  achievements = achievements.filter(a => a.id !== id);
  await persist();
  renderAll();
}

/* ---------- MODAL ---------- */
function buildTeamSelect(){
  const wrap = document.getElementById('teamSelect');
  wrap.innerHTML = TEAMS.map(t => `
    <div class="team-opt ${t.id === selectedTeam ? 'selected' : ''}" data-id="${t.id}" style="${t.id === selectedTeam ? `background:${t.color}` : ''}">${t.name}</div>
  `).join('');
  wrap.querySelectorAll('.team-opt').forEach(opt => {
    opt.onclick = () => { selectedTeam = opt.dataset.id; buildTeamSelect(); };
  });
}

function openModal(){
  selectedTeam = currentView !== 'leaderboard' ? currentView : TEAMS[0].id;
  buildTeamSelect();
  document.getElementById('fPoints').value = '';
  document.getElementById('fWhy').value = '';
  const today = new Date();
  document.getElementById('fDate').value = String(today.getMonth()+1).padStart(2,'0') + '/' + String(today.getDate()).padStart(2,'0');
  document.getElementById('modalBackdrop').classList.add('active');
}
function closeModal(){ document.getElementById('modalBackdrop').classList.remove('active'); }

document.getElementById('openAdd').onclick = async () => {
  if(await requireUnlock()) openModal();
};
document.getElementById('cancelAdd').onclick = closeModal;
document.getElementById('modalBackdrop').onclick = (e) => { if(e.target.id === 'modalBackdrop') closeModal(); };

document.getElementById('saveAdd').onclick = async () => {
  const points = Number(document.getElementById('fPoints').value);
  const why = document.getElementById('fWhy').value.trim();
  const date = document.getElementById('fDate').value.trim();
  if(!points || !why){ alert('Add points and what happened.'); return; }
  const newId = achievements.length ? Math.max(...achievements.map(a => a.id)) + 1 : 1;
  achievements.push({ id:newId, team:selectedTeam, points, why, date: date || '—' });
  await persist();
  renderAll();
  closeModal();
};

loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
